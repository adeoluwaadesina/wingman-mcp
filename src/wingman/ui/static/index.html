<!doctype html>
<html lang="en" data-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';">
<title>Wingman</title>
<style>/*__WINGMAN_CSS__*/</style>
</head>
<body>
  <div id="stage" class="stage" data-plan="">
    <header class="header">
      <div class="title-block">
        <button class="back-link" data-role="back-link" hidden aria-label="Back to all plans">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
          All plans
        </button>
        <h1 class="title" data-role="title" contenteditable="false" spellcheck="false"></h1>
        <p class="subtitle" data-role="subtitle">0 tasks &middot; 0 done</p>
      </div>
      <div class="header-actions">
        <button class="icon-btn" data-role="theme-toggle" aria-label="Toggle theme">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor" d="M12 4V2m0 20v-2m8-8h2M2 12h2m13.66-5.66l1.42-1.42M4.92 19.08l1.42-1.42m0-11.32L4.92 4.92m14.16 14.16l-1.42-1.42M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"
                  stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="icon-btn" data-role="menu-toggle" aria-label="More actions">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <circle cx="5" cy="12" r="1.7" fill="currentColor"/>
            <circle cx="12" cy="12" r="1.7" fill="currentColor"/>
            <circle cx="19" cy="12" r="1.7" fill="currentColor"/>
          </svg>
        </button>
        <div class="menu" data-role="menu" hidden>
          <button data-action="all-plans"><span class="mi">&#8592;</span> All plans</button>
          <div class="menu-divider"></div>
          <button data-action="rename"><span class="mi">&#9998;</span> Rename plan</button>
          <button data-action="clear-completed"><span class="mi">&#9003;</span> Clear completed</button>
          <button data-action="build-from-chat"><span class="mi">&#128172;</span> Build from conversation</button>
          <button data-action="clear-all"><span class="mi">&#128465;</span> Clear all tasks</button>
          <button data-action="export"><span class="mi">&#128229;</span> Export as markdown</button>
          <div class="menu-divider"></div>
          <button data-action="delete-plan" class="danger"><span class="mi">&#128465;</span> Delete plan</button>
        </div>
      </div>
    </header>

    <section class="progress-card" data-role="progress" hidden>
      <div class="progress-top">
        <div class="progress-counts">
          <span class="progress-done" data-role="p-done">0</span>
          <span class="progress-total" data-role="p-total">of 0</span>
        </div>
        <div class="progress-pct"><span data-role="p-pct">0</span>% complete</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" data-role="p-fill"></div></div>
      <div class="progress-pills">
        <span class="pill pill-done"><b data-role="pill-done">0</b> done</span>
        <span class="pill pill-progress"><b data-role="pill-progress">0</b> in&nbsp;progress</span>
        <span class="pill pill-pending"><b data-role="pill-pending">0</b> pending</span>
      </div>
    </section>

    <ul class="task-list" data-role="task-list"></ul>

    <section class="picker-section" data-role="picker" hidden>
      <ul class="picker-list" data-role="picker-list"></ul>
    </section>

    <section class="empty-state" data-role="empty" hidden>
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z M16 8L2 22 M17.5 15H9"
                stroke="currentColor" stroke-width="1.6" fill="none"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2 class="empty-title">Nothing here yet</h2>
      <p class="empty-text">Wingman keeps a plan you and Claude can both edit during this conversation. Ask Claude to add tasks, or type one below to begin.</p>
      <button class="primary-btn" data-action="build-from-chat">Build from our conversation &rarr;</button>
      <div class="empty-divider"><span>or type below</span></div>
    </section>

    <form class="add-form" data-role="add-form" autocomplete="off">
      <span class="add-plus" aria-hidden="true">+</span>
      <input type="text" class="add-input" data-role="add-input"
             placeholder="Add a task and press Enter" maxlength="2000" />
      <button type="submit" class="add-submit" data-role="add-submit" aria-label="Add task" hidden>
        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path d="M5 12h13M13 6l6 6-6 6" stroke="currentColor" stroke-width="2"
                fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>

    <footer class="footer">
      <span class="brand" data-role="brand">WINGMAN &middot; MCP plan agent &middot; build <!--__WINGMAN_BUILD__--></span>
      <span class="status" data-role="status"></span>
    </footer>
  </div>

  <script>/*__WINGMAN_MCP_SDK__*/</script>
  <script>/*__WINGMAN_SORTABLE__*/</script>
  <script>/*__WINGMAN_JS__*/</script>
</body>
</html>
